<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>植物管理アプリ v3</title>
  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#2563eb;
      --green:#059669;
      --orange:#d97706;
      --red:#dc2626;
      --purple:#7c3aed;
      --shadow:0 6px 18px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif}
    body{padding:16px;max-width:1080px;margin:0 auto}
    h1,h2,h3,p{margin:0}
    button,input,select,textarea{font:inherit}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .title{font-size:28px;font-weight:800;line-height:1.2}
    .sub{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.5}
    .date-box{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius);padding:14px 16px;min-width:220px}
    .date-box label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    .date-box input{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:16px;background:#fff}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .card{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius);padding:16px}
    .stat-label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .stat-value{font-size:32px;font-weight:800}
    .tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
    .tab-btn{border:none;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:16px;padding:14px 10px;font-size:16px;font-weight:700;cursor:pointer}
    .tab-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .hidden{display:none !important}
    .section-title{font-size:20px;font-weight:800;margin-bottom:12px}
    input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);background:#fff;border-radius:14px}
    button{border:none;cursor:pointer;padding:12px 14px;border-radius:14px;min-height:46px}
    .primary{background:var(--blue);color:#fff}
    .secondary{background:#fff;border:1px solid var(--line)}
    .success{background:var(--green);color:#fff}
    .warning{background:var(--orange);color:#fff}
    .danger{background:var(--red);color:#fff}
    .spray{background:var(--purple);color:#fff}
    .muted{color:var(--muted)}
    .toolbar{display:grid;grid-template-columns:1.4fr 1fr auto auto;gap:10px;margin-bottom:14px}
    .top-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
    .group-block{margin-top:18px}
    .group-name{font-size:14px;font-weight:800;color:var(--muted);margin:0 0 8px 4px}
    .plant-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .plant-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow)}
    .plant-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}
    .plant-name{font-size:18px;font-weight:800;line-height:1.25}
    .badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;white-space:nowrap}
    .badge-due{background:#fee2e2;color:#991b1b}
    .badge-soon{background:#fef3c7;color:#92400e}
    .badge-wait{background:#e5e7eb;color:#374151}
    .badge-spray{background:#ede9fe;color:#5b21b6}
    .meta{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
    .meta-box{background:#f8fafc;border-radius:14px;padding:10px;font-size:13px;line-height:1.4}
    .meta-box b{display:block;font-size:15px;color:#111827;margin-top:3px}
    .btn-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .btn-row button{font-weight:800}
    .list-card{margin-bottom:12px}
    .list-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .rule{font-size:13px;color:var(--muted);margin-top:4px}
    .note{font-size:13px;color:#4b5563;margin-top:4px}
    .plant-actions{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:12px}
    .empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:24px;text-align:center;color:var(--muted)}
    .history-toolbar{display:grid;grid-template-columns:1fr 180px 180px auto;gap:10px;margin-bottom:12px}
    .log-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff;margin-bottom:10px}
    .log-actions{display:flex;gap:8px;flex-wrap:wrap}
    .small{font-size:13px;color:var(--muted)}
    .add-box{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
    .add-grid{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:10px;margin-bottom:10px}
    .add-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .modal-wrap{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:flex-end;justify-content:center;padding:12px;z-index:50}
    .modal-wrap.show{display:flex}
    .modal{width:min(760px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:24px 24px 18px 18px;box-shadow:0 24px 80px rgba(0,0,0,.25);padding:18px}
    .modal-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .modal-title{font-size:22px;font-weight:800}
    .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .footer-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
    .inline-link{background:none;border:none;padding:0;color:var(--blue);min-height:auto;border-radius:0}
    .pill{background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700}
    @media (max-width: 800px){
      .grid-4{grid-template-columns:repeat(2,1fr)}
      .tabs{grid-template-columns:repeat(2,1fr)}
      .toolbar,.history-toolbar,.top-actions,.add-grid,.add-grid-2,.plant-grid,.meta,.btn-row,.plant-actions,.modal-grid{grid-template-columns:1fr}
      body{padding:12px}
      .title{font-size:24px}
      .modal{padding:14px}
    }
  </style>
</head>
<body>
  <div class="top">
    <div>
      <div class="title">植物管理アプリ</div>
      <div class="sub">水・HB・RD・薬剤を分けて管理。過去履歴の確認、あとから編集、株情報の編集、グループ一括入力に対応。</div>
    </div>
    <div class="date-box">
      <label>判定日</label>
      <input type="date" id="judgeDate" />
    </div>
  </div>

  <div class="grid-4">
    <div class="card"><div class="stat-label">今日やる株</div><div class="stat-value" id="statDue">0</div></div>
    <div class="card"><div class="stat-label">明日目安</div><div class="stat-value" id="statSoon">0</div></div>
    <div class="card"><div class="stat-label">登録株数</div><div class="stat-value" id="statCount">0</div></div>
    <div class="card"><div class="stat-label">履歴合計</div><div class="stat-value" id="statLogs">0</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="today">今日の管理</button>
    <button class="tab-btn" data-tab="plants">植物一覧</button>
    <button class="tab-btn" data-tab="water-history">水履歴</button>
    <button class="tab-btn" data-tab="spray-history">薬剤履歴</button>
    <button class="tab-btn" data-tab="groups">グループ</button>
  </div>

  <section id="tab-today">
    <div class="card">
      <div class="section-title">今日の管理</div>
      <div class="top-actions">
        <button class="primary" id="waterAllBtn">今日の水候補をまとめて水</button>
        <button class="secondary" id="hbAllBtn">今日のHB候補をまとめてHB</button>
        <button class="secondary" id="rdAllBtn">今日のRD候補をまとめてRD</button>
      </div>
      <div class="add-box" style="margin-bottom:14px;">
        <div class="section-title" style="font-size:18px;">グループ一括入力</div>
        <div class="add-grid">
          <select id="bulkGroupSelect"></select>
          <select id="bulkActionType">
            <option value="water">水</option>
            <option value="hb">HB</option>
            <option value="rd">RD</option>
            <option value="spray">薬剤</option>
          </select>
          <input id="bulkDate" type="date" />
        </div>
        <div class="add-grid-2">
          <input id="bulkMedicine" placeholder="薬剤名（薬剤選択時のみ）" />
          <input id="bulkMemo" placeholder="メモ・倍率など" />
        </div>
        <div style="margin-top:10px;"><button class="primary" id="bulkApplyBtn">グループ丸ごと記録</button></div>
      </div>
      <div id="todayContent"></div>
    </div>
  </section>

  <section id="tab-plants" class="hidden">
    <div class="add-box">
      <div class="section-title">植物追加</div>
      <div class="add-grid">
        <input id="newName" placeholder="株名" />
        <select id="newGroup"></select>
        <input id="newInterval" type="number" placeholder="今の空き日数" />
      </div>
      <div class="add-grid-2">
        <input id="newRule" placeholder="ルールメモ 例: 5日目安" />
        <input id="newNote" placeholder="補足メモ" />
      </div>
      <div style="margin-top:10px;"><button class="primary" id="addPlantBtn">追加する</button></div>
    </div>

    <div class="card">
      <div class="section-title">植物一覧</div>
      <div class="small" style="margin-bottom:10px;">各株ごとに 水 / HB / RD の空き日数を別々に設定できる</div>
      <div class="toolbar">
        <input id="searchInput" placeholder="株名・ルール・メモ検索" />
        <select id="groupFilter"></select>
        <label style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:0 12px;">
          <input type="checkbox" id="dueOnlyCheck" style="width:auto;" />
          <span>今日候補のみ</span>
        </label>
        <button class="secondary" id="clearSearchBtn">検索クリア</button>
      </div>
      <div id="plantsContent"></div>
    </div>
  </section>

  <section id="tab-water-history" class="hidden">
    <div class="card">
      <div class="section-title">水管理の履歴</div>
      <div class="history-toolbar">
        <input id="waterHistorySearch" placeholder="株名・内容検索" />
        <select id="waterHistoryTypeFilter">
          <option value="all">水 / HB / RD すべて</option>
          <option value="水">水</option>
          <option value="HB">HB</option>
          <option value="RD">RD</option>
        </select>
        <select id="waterHistoryPlantFilter"></select>
        <button class="secondary" id="waterHistoryClearBtn">絞り込みクリア</button>
      </div>
      <div id="waterHistoryContent"></div>
    </div>
  </section>

  <section id="tab-spray-history" class="hidden">
    <div class="add-box">
      <div class="section-title">薬剤散布を記録</div>
      <div class="add-grid">
        <input id="sprayDate" type="date" />
        <select id="sprayPlant"></select>
        <input id="sprayMedicine" placeholder="薬剤名 例: ベンレート" />
      </div>
      <div class="add-grid-2">
        <input id="sprayDilution" placeholder="倍率・量 例: 2000倍 / 2ml" />
        <input id="sprayMemo" placeholder="補足メモ 例: ダイン使用" />
      </div>
      <div style="margin-top:10px;"><button class="spray" id="addSprayBtn">薬剤履歴を追加</button></div>
    </div>

    <div class="card">
      <div class="section-title">薬剤散布の履歴</div>
      <div class="history-toolbar">
        <input id="sprayHistorySearch" placeholder="株名・薬剤名・メモ検索" />
        <input id="sprayHistoryMedicineFilter" placeholder="薬剤名で絞る" />
        <select id="sprayHistoryPlantFilter"></select>
        <button class="secondary" id="sprayHistoryClearBtn">絞り込みクリア</button>
      </div>
      <div id="sprayHistoryContent"></div>
    </div>
  </section>

  <section id="tab-groups" class="hidden">
    <div id="groupsContent"></div>
  </section>

  <div class="modal-wrap" id="modalWrap">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">編集</div>
        <button class="secondary" id="closeModalBtn">閉じる</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const groupLabels = {
      smallagave: "smallagave",
      mediumagave: "mediumagave",
      agave: "agave",
      wildagave: "wildagave",
      cactus: "cactus",
      codex: "codex",
      euphorbia: "euphorbia"
    };

    const defaultPlants = [
      { id: 1, name: "子株", group: "smallagave", interval: 3, hbInterval: 7, rdInterval: 14, lastWatered: "2026-03-10", lastHbDate: "2026-03-10", lastRdDate: "2026-03-10", rule: "子株3", note: "seaser redform / italia noname / 海王" },
      { id: 2, name: "GG compacta", group: "mediumagave", interval: 7, hbInterval: 14, rdInterval: 21, lastWatered: "2026-03-10", lastHbDate: "2026-03-10", lastRdDate: "2026-03-10", rule: "7日目安", note: "" },
      { id: 3, name: "萬代厳竜", group: "mediumagave", interval: 7, hbInterval: 14, rdInterval: 21, lastWatered: "2026-03-10", lastHbDate: "2026-03-10", lastRdDate: "2026-03-10", rule: "7日目安", note: "" },
      { id: 4, name: "ホリダ", group: "mediumagave", interval: 7, hbInterval: 14, rdInterval: 21, lastWatered: "2026-03-10", lastHbDate: "2026-03-10", lastRdDate: "2026-03-10", rule: "7日目安", note: "" },
      { id: 5, name: "spawn", group: "mediumagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 6, name: "orca", group: "smallagave", interval: 2, lastWatered: "2026-03-10", rule: "2日目安", note: "" },
      { id: 7, name: "ripple effect", group: "smallagave", interval: 3, lastWatered: "2026-03-10", rule: "仮で3日", note: "" },

      { id: 9, name: "CJ-1", group: "smallagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 10, name: "ゴリ猫", group: "smallagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 11, name: "redcat", group: "smallagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 12, name: "オアハカ", group: "smallagave", interval: 3, lastWatered: "2026-03-10", rule: "3日目安", note: "" },
      { id: 13, name: "イタリア noname", group: "smallagave", interval: 2, lastWatered: "2026-03-10", rule: "2日目安", note: "" },
      { id: 14, name: "crab", group: "smallagave", interval: 2, lastWatered: "2026-03-10", rule: "2日目安", note: "" },
      { id: 15, name: "野火", group: "smallagave", interval: 2, lastWatered: "2026-03-10", rule: "2日目安", note: "" },
      { id: 16, name: "姫巌龍", group: "smallagave", interval: 2, lastWatered: "2026-03-10", rule: "2日目安", note: "" },
      { id: 17, name: "yj白鯨", group: "smallagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 18, name: "国産白鯨", group: "smallagave", interval: 3, lastWatered: "2026-03-10", rule: "仮で3日", note: "" },
      { id: 19, name: "オアハカドワーフ", group: "smallagave", interval: 3, lastWatered: "2026-03-10", rule: "仮で3日", note: "" },
      { id: 20, name: "斑入りアガベ", group: "smallagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 21, name: "ディッキア", group: "wildagave", interval: 20, lastWatered: "2026-03-10", rule: "20日目安", note: "" },

      { id: 23, name: "金鯱", group: "cactus", interval: 30, lastWatered: "2026-02-04", rule: "30日目安", note: "" },
      { id: 24, name: "守金魔天竜", group: "cactus", interval: 30, lastWatered: "2026-02-04", rule: "30日目安", note: "" },
      { id: 25, name: "ペクチニフェラ", group: "agave", interval: 30, lastWatered: "2026-02-04", rule: "30日目安", note: "" },
      { id: 26, name: "ロフォフォラ", group: "cactus", interval: 14, lastWatered: "2026-02-04", rule: "14日仮", note: "" },

      { id: 28, name: "オベサ", group: "euphorbia", interval: 14, lastWatered: "2026-02-04", rule: "14日目安", note: "" },
      { id: 29, name: "hyoronaga", group: "cactus", interval: 30, lastWatered: "2026-02-04", rule: "30日目安", note: "" },
      { id: 30, name: "センナ", group: "codex", interval: 5, lastWatered: "2026-02-04", rule: "5日仮", note: "" },
      { id: 31, name: "二ノ宮グラキリス", group: "codex", interval: 7, lastWatered: "2026-02-04", rule: "7日仮", note: "" },
      { id: 32, name: "グラキリス", group: "codex", interval: 7, lastWatered: "2026-02-04", rule: "7日仮", note: "" },

      { id: 34, name: "二ノ宮ブーファンディスティカ", group: "codex", interval: 20, lastWatered: "2026-02-04", rule: "20日目安", note: "" },

      { id: 37, name: "foetida", group: "agave", interval: 10, lastWatered: "2026-02-04", rule: "10日仮", note: "" },
      { id: 38, name: "亀甲竜", group: "codex", interval: 10, lastWatered: "2026-02-04", rule: "10日仮", note: "" },
      { id: 39, name: "イネルミス", group: "cactus", interval: 10, lastWatered: "2026-02-04", rule: "10日目安", note: "" },
      { id: 40, name: "エノプラ", group: "cactus", interval: 10, lastWatered: "2026-02-04", rule: "10日目安", note: "" },
      { id: 41, name: "ホリダブルースノー", group: "mediumagave", interval: 20, lastWatered: "2026-02-04", rule: "20日目安", note: "" }
    ];

    const defaultWaterLogs = [
      { id: 1, date: "2026-03-10", plantId: 1, type: "水", memo: "" },
      { id: 2, date: "2026-03-10", plantId: 2, type: "水", memo: "" },
      { id: 3, date: "2026-03-10", plantId: 3, type: "水", memo: "" },
      { id: 4, date: "2026-03-10", plantId: 4, type: "水", memo: "" },
      { id: 5, date: "2026-03-10", plantId: 5, type: "HB", memo: "" }
    ];

    function loadJSON(key, fallback){
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch(e){
        return fallback;
      }
    }

    // 既存データを引き継ぐ
    const savedPlants = loadJSON("plantManagerPlants", null);
    const savedOldLogs = loadJSON("plantManagerLogs", null); // 旧水履歴キー
    const savedWaterLogs = loadJSON("plantManagerWaterLogs", null); // 新水履歴キー
    const savedSprayLogs = loadJSON("plantManagerSprayLogs", null);
    const savedJudgeDate = localStorage.getItem("plantManagerJudgeDate");

    let plants = (savedPlants || defaultPlants).map(p => ({
      ...p,
      hbInterval: p.hbInterval ?? (p.interval ? Math.max(p.interval, p.interval + 5) : 14),
      rdInterval: p.rdInterval ?? (p.interval ? Math.max(p.interval + 7, p.interval + 10) : 21),
      lastHbDate: p.lastHbDate || p.lastWatered,
      lastRdDate: p.lastRdDate || p.lastWatered
    }));
    let waterLogs = savedWaterLogs || savedOldLogs || defaultWaterLogs;
    let sprayLogs = savedSprayLogs || [];
    let judgeDate = savedJudgeDate || new Date().toISOString().slice(0,10);

    const tabs = document.querySelectorAll(".tab-btn");
    const sections = {
      today: document.getElementById("tab-today"),
      plants: document.getElementById("tab-plants"),
      "water-history": document.getElementById("tab-water-history"),
      "spray-history": document.getElementById("tab-spray-history"),
      groups: document.getElementById("tab-groups")
    };

    const judgeDateInput = document.getElementById("judgeDate");
    const statDue = document.getElementById("statDue");
    const statSoon = document.getElementById("statSoon");

    function saveData(){
      localStorage.setItem("plantManagerPlants", JSON.stringify(plants));
      localStorage.setItem("plantManagerWaterLogs", JSON.stringify(waterLogs));
      localStorage.setItem("plantManagerLogs", JSON.stringify(waterLogs)); // 旧キーも更新
      localStorage.setItem("plantManagerSprayLogs", JSON.stringify(sprayLogs));
      localStorage.setItem("plantManagerJudgeDate", judgeDate);

    function daysBetween(a, b){
      const ms = 1000*60*60*24;
      const d1 = new Date(a);
      const d2 = new Date(b);
      d1.setHours(0,0,0,0);
      d2.setHours(0,0,0,0);
      return Math.floor((d2 - d1) / ms);
    }

    function addDays(dateStr, days){
      const d = new Date(dateStr);
      d.setDate(d.getDate() + Number(days));
      return d.toISOString().slice(0,10);
    }

    function statusForPlant(plant){
      const elapsed = daysBetween(plant.lastWatered, judgeDate);
      const dueIn = plant.interval - elapsed;
      if (dueIn <= 0) return { label: "今日やる", cls: "badge-due", elapsed, dueIn };
      if (dueIn === 1) return { label: "明日目安", cls: "badge-soon", elapsed, dueIn };
      return { label: "待機", cls: "badge-wait", elapsed, dueIn };
    }

    function hbStatusForPlant(plant){
      const elapsed = daysBetween(plant.lastHbDate || plant.lastWatered, judgeDate);
      const dueIn = (plant.hbInterval ?? 14) - elapsed;
      if (dueIn <= 0) return { label: "今日HB", cls: "badge-due", elapsed, dueIn };
      if (dueIn === 1) return { label: "明日HB", cls: "badge-soon", elapsed, dueIn };
      return { label: "HB待機", cls: "badge-wait", elapsed, dueIn };
    }

    function rdStatusForPlant(plant){
      const elapsed = daysBetween(plant.lastRdDate || plant.lastWatered, judgeDate);
      const dueIn = (plant.rdInterval ?? 21) - elapsed;
      if (dueIn <= 0) return { label: "今日RD", cls: "badge-due", elapsed, dueIn };
      if (dueIn === 1) return { label: "明日RD", cls: "badge-soon", elapsed, dueIn };
      return { label: "RD待機", cls: "badge-wait", elapsed, dueIn };
    };
      if (dueIn === 1) return { label: "明日目安", cls: "badge-soon", elapsed, dueIn };
      return { label: "待機", cls: "badge-wait", elapsed, dueIn };
    }

      const plant = plants.find(p => p.id === id);

    function buildSelectOptions(selectEl, includeAll=false, allLabel="すべて"){
      selectEl.innerHTML = "";
      if (includeAll){
        const op = document.createElement("option");
        op.value = "all";
        op.textContent = allLabel;
        selectEl.appendChild(op);
      }
      plants.forEach(p => {

        op.value = String(p.id);
        op.textContent = p.name;
        selectEl.appendChild(op);
      });
    }

    function buildGroupOptions(selectEl, includeAll=false){
      selectEl.innerHTML = "";
      if (includeAll){

        op.textContent = "すべて";
        selectEl.appendChild(op);
      }

        const op = document.createElement("option");
        op.value = key;
        op.textContent = label;
        selectEl.appendChild(op);
      });

    function escapeHtml(text){
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function openModal(title, html){
      modalTitle.textContent = title;
      modalBody.innerHTML = html;
      modalWrap.classList.add("show");

    function closeModal(){
      modalWrap.classList.remove("show");
      modalBody.innerHTML = "";
    }

    function markPlant(id, type){
      const plant = plants.find(p => p.id === id);
      if (!plant) return;
      if (type === '水') plant.lastWatered = judgeDate;
      if (type === 'HB') plant.lastHbDate = judgeDate;
      if (type === 'RD') plant.lastRdDate = judgeDate;
      waterLogs.unshift({ id: Date.now() + Math.random(), date: judgeDate, plantId: id, type, memo: "" });
      saveData();
      render();
    }

    function markAllDue(type){
      const targetPlants = plants.filter(p => {
        if (type === '水') return statusForPlant(p).dueIn <= 0;
        if (type === 'HB') return hbStatusForPlant(p).dueIn <= 0;
        if (type === 'RD') return rdStatusForPlant(p).dueIn <= 0;
        return false;
      });
      targetPlants.forEach(p => {
        if (type === '水') p.lastWatered = judgeDate;
        if (type === 'HB') p.lastHbDate = judgeDate;
        if (type === 'RD') p.lastRdDate = judgeDate;
        waterLogs.unshift({ id: Date.now() + Math.random(), date: judgeDate, plantId: p.id, type, memo: "" });
      });
      saveData();
      render();
    }

    function movePlant(id, direction){
      const idx = plants.findIndex(p => p.id === id);
      if (idx < 0) return;
      const newIdx = direction === "up" ? idx - 1 : idx + 1;
      if (newIdx < 0 || newIdx >= plants.length) return;
      const temp = plants[idx];
      plants[idx] = plants[newIdx];
      plants[newIdx] = temp;
      saveData();
      render();
    }

    function deletePlant(id){
      if (!confirm("この株を削除する？ 水履歴と薬剤履歴も一緒に消える。")) return;
      plants = plants.filter(p => p.id !== id);
      waterLogs = waterLogs.filter(l => l.plantId !== id);
      sprayLogs = sprayLogs.filter(l => l.plantId !== id);
      saveData();
      render();
    }

    function addPlant(){
      const name = newName.value.trim();
      if (!name) return alert("株名を入れて");
      const baseInterval = Number(newInterval.value || 7);
      plants.push({
        id: Date.now(),
        name,
        group: newGroup.value,
        interval: baseInterval,
        hbInterval: Math.max(baseInterval, baseInterval + 5),
        rdInterval: Math.max(baseInterval + 7, baseInterval + 10),
        lastWatered: judgeDate,
        lastHbDate: judgeDate,
        lastRdDate: judgeDate,
        rule: newRule.value.trim(),
        note: newNote.value.trim()
      });
      newName.value = "";
      newInterval.value = "";
      newRule.value = "";
      newNote.value = "";
      saveData();
      render();
    }

    function addSprayLog(){
      if (!sprayPlant.value) return alert("株を選んで");
      if (!sprayMedicine.value.trim()) return alert("薬剤名を入れて");
      sprayLogs.unshift({
        id: Date.now() + Math.random(),
        date: sprayDate.value || judgeDate,
        plantId: Number(sprayPlant.value),
        medicine: sprayMedicine.value.trim(),
        dilution: sprayDilution.value.trim(),
        memo: sprayMemo.value.trim()
      });
      sprayMedicine.value = "";
      sprayDilution.value = "";
      sprayMemo.value = "";
      saveData();
      render();
    }

    function saveWaterLogEdit(id){
      const log = waterLogs.find(l => l.id === id);
      if (!log) return;
      const oldPlantId = log.plantId;
      const oldDate = log.date;
      log.date = document.getElementById("editWaterDate").value || log.date;
      log.plantId = Number(document.getElementById("editWaterPlant").value);
      log.type = document.getElementById("editWaterType").value;
      log.memo = document.getElementById("editWaterMemo").value.trim();
      // 最終給水日を履歴全体から再計算
      recalcPlantLastWatered(oldPlantId);
      recalcPlantLastWatered(log.plantId);
      saveData();
      closeModal();
      render();
    }

    function deleteWaterLog(id){
      const log = waterLogs.find(l => l.id === id);
      if (!log) return;
      if (!confirm("この水履歴を削除する？")) return;
      const plantId = log.plantId;
      waterLogs = waterLogs.filter(l => l.id !== id);
      recalcPlantLastWatered(plantId);
      saveData();
      closeModal();
      render();
    }

    function recalcPlantLastWatered(plantId){
      const plant = plants.find(p => p.id === plantId);
      if (!plant) return;
      const related = waterLogs.filter(l => l.plantId === plantId).sort((a,b) => String(b.date).localeCompare(String(a.date)));
      if (related.length) plant.lastWatered = related[0].date;
    }

    function renderStats(){

    function renderToday(){
      const grouped = {};
      Object.keys(groupLabels).forEach(g => grouped[g] = []);
      plants.forEach(p => {
        const st = statusForPlant(p);
        if (st.dueIn <= 0) grouped[p.group].push({ ...p, st });
      });
      let html = "";
      const hasAny = Object.values(grouped).some(arr => arr.length > 0);
      if (!hasAny){
        todayContent.innerHTML = '<div class="empty">今日は水やり候補なし</div>';
        return;

      Object.entries(grouped).forEach(([groupKey, items]) => {

        html += `<div class="group-block"><div class="group-name">${groupLabels[groupKey]}</div><div class="plant-grid">`;

          html += `

    function renderPlants(){

        } else {
          items.forEach(p => {
            const st = statusForPlant(p);
            html += `<div class="log-item"><div><div style="font-weight:700;">${escapeHtml(p.name)}</div><div class="small">${escapeHtml(p.rule || "")}</div></div><span class="badge ${st.cls}">${st.label}</span></div>`;
          });
        }
        html += `</div>`;
      });
      groupsContent.innerHTML = html;
    }

    function renderStats(){
      const dueToday = plants.filter(p => statusForPlant(p).dueIn <= 0).length;
      const soon = plants.filter(p => statusForPlant(p).dueIn === 1).length;
      statDue.textContent = dueToday;
      statSoon.textContent = soon;
      statCount.textContent = plants.length;
      statLogs.textContent = waterLogs.length + sprayLogs.length;
    }

    function render(){
      buildGroupOptions(newGroup, false);
      buildGroupOptions(groupFilter, true);
      buildSelectOptions(waterHistoryPlantFilter, true, "株すべて");
      buildSelectOptions(sprayPlant, false);
      buildSelectOptions(sprayHistoryPlantFilter, true, "株すべて");
      sprayDate.value = judgeDate;
      renderStats();
      renderToday();
      renderPlants();
      renderWaterHistory();
      renderSprayHistory();
      renderGroups();
    }

    tabs.forEach(btn => {
      btn.addEventListener("click", () => {
        tabs.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        Object.values(sections).forEach(sec => sec.classList.add("hidden"));
        sections[btn.dataset.tab].classList.remove("hidden");
      });
    });

    judgeDateInput.value = judgeDate;
    judgeDateInput.addEventListener("change", e => {
      judgeDate = e.target.value;
      saveData();
      render();
    });

    document.getElementById("waterAllBtn").addEventListener("click", () => markAllDue("水"));
    document.getElementById("hbAllBtn").addEventListener("click", () => markAllDue("HB"));
    document.getElementById("rdAllBtn").addEventListener("click", () => markAllDue("RD"));
    document.getElementById("addPlantBtn").addEventListener("click", addPlant);
    document.getElementById("addSprayBtn").addEventListener("click", addSprayLog);
    document.getElementById("clearSearchBtn").addEventListener("click", () => {
      searchInput.value = "";
      groupFilter.value = "all";
      dueOnlyCheck.checked = false;
      render();
    });
    document.getElementById("waterHistoryClearBtn").addEventListener("click", () => {
      waterHistorySearch.value = "";
      waterHistoryTypeFilter.value = "all";
      waterHistoryPlantFilter.value = "all";
      render();
    });
    document.getElementById("sprayHistoryClearBtn").addEventListener("click", () => {
      sprayHistorySearch.value = "";
      sprayHistoryMedicineFilter.value = "";
      sprayHistoryPlantFilter.value = "all";
      render();
    });

    [searchInput, groupFilter, dueOnlyCheck, waterHistorySearch, waterHistoryTypeFilter, waterHistoryPlantFilter, sprayHistorySearch, sprayHistoryMedicineFilter, sprayHistoryPlantFilter].forEach(el => {
      el.addEventListener(el.type === 'checkbox' ? 'change' : 'input', render);
      if (el.tagName === 'SELECT') el.addEventListener('change', render);
    });

    closeModalBtn.addEventListener("click", closeModal);
    modalWrap.addEventListener("click", (e) => { if (e.target === modalWrap) closeModal(); });

    render();

    // グローバル公開
    window.markPlant = markPlant;
    window.movePlant = movePlant;
    window.deletePlant = deletePlant;
    window.updateInterval = updateInterval;
    window.updateGroup = updateGroup;
    window.openPlantEdit = openPlantEdit;
    window.savePlantEdit = savePlantEdit;
    window.openWaterLogEdit = openWaterLogEdit;
    window.saveWaterLogEdit = saveWaterLogEdit;
    window.deleteWaterLog = deleteWaterLog;
    window.openSprayLogEdit = openSprayLogEdit;
    window.saveSprayLogEdit = saveSprayLogEdit;
    window.deleteSprayLog = deleteSprayLog;
    window.closeModal = closeModal;
  </script>
</body>
</html>
