<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>植物管理アプリ</title>
  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#2563eb;
      --green:#059669;
      --orange:#d97706;
      --red:#dc2626;
      --shadow:0 6px 18px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif}
    body{padding:16px;max-width:980px;margin:0 auto}
    h1,h2,h3,p{margin:0}
    .top{
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;
      margin-bottom:16px;
    }
    .title{font-size:28px;font-weight:800;line-height:1.2}
    .sub{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.5}
    .date-box{
      background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
      border-radius:var(--radius);padding:14px 16px;min-width:220px;
    }
    .date-box label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    .date-box input{
      width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:16px;
      background:#fff;
    }
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .card{
      background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius);
      padding:16px;
    }
    .stat-label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .stat-value{font-size:32px;font-weight:800}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
    .tab-btn{
      border:none;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);
      border-radius:16px;padding:14px 10px;font-size:16px;font-weight:700;cursor:pointer;
    }
    .tab-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .hidden{display:none}
    .section-title{font-size:20px;font-weight:800;margin-bottom:12px}
    .toolbar{
      display:grid;grid-template-columns:1.4fr 1fr auto auto;gap:10px;margin-bottom:14px;
    }
    .toolbar input,.toolbar select,.toolbar button,.plant-actions button,.plant-actions select,.plant-actions input,.bulk-row button,.top-actions button,.small-btn{
      min-height:46px;border-radius:14px;font-size:16px;
    }
    input,select,textarea,button{
      font:inherit;
    }
    input,select,textarea{
      width:100%;padding:12px;border:1px solid var(--line);background:#fff;
    }
    button{
      border:none;cursor:pointer;padding:12px 14px;
    }
    .primary{background:var(--blue);color:#fff}
    .secondary{background:#fff;border:1px solid var(--line)}
    .success{background:var(--green);color:#fff}
    .warning{background:var(--orange);color:#fff}
    .danger{background:var(--red);color:#fff}
    .muted{color:var(--muted)}
    .group-block{margin-top:18px}
    .group-name{font-size:14px;font-weight:800;color:var(--muted);margin:0 0 8px 4px;text-transform:none}
    .plant-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .plant-card{
      background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow)
    }
    .plant-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}
    .plant-name{font-size:18px;font-weight:800;line-height:1.25}
    .badge{
      display:inline-flex;align-items:center;justify-content:center;
      border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;white-space:nowrap
    }
    .badge-due{background:#fee2e2;color:#991b1b}
    .badge-soon{background:#fef3c7;color:#92400e}
    .badge-wait{background:#e5e7eb;color:#374151}
    .meta{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
    .meta-box{background:#f8fafc;border-radius:14px;padding:10px;font-size:13px;line-height:1.4}
    .meta-box b{display:block;font-size:15px;color:#111827;margin-top:3px}
    .btn-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .btn-row button{font-weight:800}
    .top-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
    .bulk-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
    .list-card{margin-bottom:12px}
    .list-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .rule{font-size:13px;color:var(--muted);margin-top:4px}
    .note{font-size:13px;color:#4b5563;margin-top:4px}
    .plant-actions{
      display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px
    }
    .check-row{display:flex;align-items:center;gap:10px;margin-top:10px}
    .check-row input{width:auto;min-height:auto}
    .log-item{
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff;margin-bottom:10px
    }
    .small{font-size:13px;color:var(--muted)}
    .add-box{
      background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
      padding:16px;margin-bottom:14px
    }
    .add-grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:10px;margin-bottom:10px}
    .add-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .empty{
      background:#fff;border:1px dashed var(--line);border-radius:18px;padding:24px;text-align:center;color:var(--muted)
    }
    @media (max-width: 800px){
      .grid-4{grid-template-columns:repeat(2,1fr)}
      .toolbar{grid-template-columns:1fr 1fr;gap:8px}
      .plant-grid{grid-template-columns:1fr}
      .top-actions,.bulk-row,.btn-row,.plant-actions,.add-grid,.add-grid-2{grid-template-columns:1fr}
      .tabs{grid-template-columns:repeat(2,1fr)}
      body{padding:12px}
      .title{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="top">
    <div>
      <div class="title">植物管理アプリ</div>
      <div class="sub">iPhoneで見やすい前提。今日の水やり候補、グループ管理、並び替え、記録を1つで管理。</div>
    </div>
    <div class="date-box">
      <label>判定日</label>
      <input type="date" id="judgeDate" />
    </div>
  </div>

  <div class="grid-4">
    <div class="card">
      <div class="stat-label">今日やる株</div>
      <div class="stat-value" id="statDue">0</div>
    </div>
    <div class="card">
      <div class="stat-label">明日目安</div>
      <div class="stat-value" id="statSoon">0</div>
    </div>
    <div class="card">
      <div class="stat-label">登録株数</div>
      <div class="stat-value" id="statCount">0</div>
    </div>
    <div class="card">
      <div class="stat-label">記録数</div>
      <div class="stat-value" id="statLogs">0</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="today">今日の管理</button>
    <button class="tab-btn" data-tab="plants">植物一覧</button>
    <button class="tab-btn" data-tab="groups">グループ</button>
    <button class="tab-btn" data-tab="logs">履歴</button>
  </div>

  <section id="tab-today">
    <div class="card">
      <div class="section-title">今日やる株</div>
      <div class="top-actions">
        <button class="primary" id="waterAllBtn">今日の候補をまとめて水</button>
        <button class="secondary" id="hbAllBtn">今日の候補をHB</button>
        <button class="secondary" id="rdAllBtn">今日の候補をRD</button>
      </div>
      <div id="todayContent"></div>
    </div>
  </section>

  <section id="tab-plants" class="hidden">
    <div class="add-box">
      <div class="section-title">植物追加</div>
      <div class="add-grid">
        <input id="newName" placeholder="株名" />
        <select id="newGroup"></select>
        <input id="newInterval" type="number" placeholder="今の空き日数" />
      </div>
      <div class="add-grid-2">
        <input id="newRule" placeholder="ルールメモ 例: 5日目安" />
        <input id="newNote" placeholder="補足メモ" />
      </div>
      <div style="margin-top:10px;">
        <button class="primary" id="addPlantBtn">追加する</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">植物一覧</div>
      <div class="toolbar">
        <input id="searchInput" placeholder="株名・ルール・メモ検索" />
        <select id="groupFilter"></select>
        <label class="check-row" style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:0 12px;">
          <input type="checkbox" id="dueOnlyCheck" />
          <span>今日候補のみ</span>
        </label>
        <button class="secondary" id="clearSearchBtn">検索クリア</button>
      </div>
      <div id="plantsContent"></div>
    </div>
  </section>

  <section id="tab-groups" class="hidden">
    <div id="groupsContent"></div>
  </section>

  <section id="tab-logs" class="hidden">
    <div class="card">
      <div class="section-title">履歴</div>
      <div id="logsContent"></div>
    </div>
  </section>

  <script>
    const groupLabels = {
      smallagave: "smallagave",
      mediumagave: "mediumagave",
      agave: "agave",
      wildagave: "wildagave",
      cactus: "cactus",
      codex: "codex",
      euphorbia: "euphorbia"
    };

    const defaultPlants = [
      { id: 1, name: "子株", group: "smallagave", interval: 3, lastWatered: "2026-03-10", rule: "子株3", note: "seaser redform / italia noname / 海王" },
      { id: 2, name: "GG compacta", group: "mediumagave", interval: 7, lastWatered: "2026-03-10", rule: "7日目安", note: "" },
      { id: 3, name: "萬代厳竜", group: "mediumagave", interval: 7, lastWatered: "2026-03-10", rule: "7日目安", note: "" },
      { id: 4, name: "ホリダ", group: "mediumagave", interval: 7, lastWatered: "2026-03-10", rule: "7日目安", note: "" },
      { id: 5, name: "spawn", group: "mediumagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 6, name: "orca", group: "smallagave", interval: 2, lastWatered: "2026-03-10", rule: "2日目安", note: "" },
      { id: 7, name: "ripple effect", group: "smallagave", interval: 3, lastWatered: "2026-03-10", rule: "仮で3日", note: "" },
      { id: 8, name: "FO076", group: "smallagave", interval: 4, lastWatered: "2026-03-10", rule: "4日目安", note: "" },
      { id: 9, name: "CJ-1", group: "smallagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 10, name: "ゴリ猫", group: "smallagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 11, name: "redcat", group: "smallagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 12, name: "オアハカ", group: "smallagave", interval: 3, lastWatered: "2026-03-10", rule: "3日目安", note: "" },
      { id: 13, name: "イタリア noname", group: "smallagave", interval: 2, lastWatered: "2026-03-10", rule: "2日目安", note: "" },
      { id: 14, name: "crab", group: "smallagave", interval: 2, lastWatered: "2026-03-10", rule: "2日目安", note: "" },
      { id: 15, name: "野火", group: "smallagave", interval: 2, lastWatered: "2026-03-10", rule: "2日目安", note: "" },
      { id: 16, name: "姫巌龍", group: "smallagave", interval: 2, lastWatered: "2026-03-10", rule: "2日目安", note: "" },
      { id: 17, name: "yj白鯨", group: "smallagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 18, name: "国産白鯨", group: "smallagave", interval: 3, lastWatered: "2026-03-10", rule: "仮で3日", note: "" },
      { id: 19, name: "オアハカドワーフ", group: "smallagave", interval: 3, lastWatered: "2026-03-10", rule: "仮で3日", note: "" },
      { id: 20, name: "斑入りアガベ", group: "smallagave", interval: 5, lastWatered: "2026-03-10", rule: "5日目安", note: "" },
      { id: 21, name: "ディッキア", group: "wildagave", interval: 20, lastWatered: "2026-03-10", rule: "20日目安", note: "" },
      { id: 22, name: "フェロシオール", group: "cactus", interval: 30, lastWatered: "2026-02-04", rule: "30日目安", note: "" },
      { id: 23, name: "金鯱", group: "cactus", interval: 30, lastWatered: "2026-02-04", rule: "30日目安", note: "" },
      { id: 24, name: "守金魔天竜", group: "cactus", interval: 30, lastWatered: "2026-02-04", rule: "30日目安", note: "" },
      { id: 25, name: "ペクチニフェラ", group: "agave", interval: 30, lastWatered: "2026-02-04", rule: "30日目安", note: "" },
      { id: 26, name: "ロフォフォラ", group: "cactus", interval: 14, lastWatered: "2026-02-04", rule: "14日仮", note: "" },
      { id: 27, name: "疣銀冠", group: "cactus", interval: 14, lastWatered: "2026-02-04", rule: "14日仮", note: "" },
      { id: 28, name: "オベサ", group: "euphorbia", interval: 14, lastWatered: "2026-02-04", rule: "14日目安", note: "" },
      { id: 29, name: "hyoronaga", group: "cactus", interval: 30, lastWatered: "2026-02-04", rule: "30日目安", note: "" },
      { id: 30, name: "センナ", group: "codex", interval: 5, lastWatered: "2026-02-04", rule: "5日仮", note: "" },
      { id: 31, name: "二ノ宮グラキリス", group: "codex", interval: 7, lastWatered: "2026-02-04", rule: "7日仮", note: "" },
      { id: 32, name: "グラキリス", group: "codex", interval: 7, lastWatered: "2026-02-04", rule: "7日仮", note: "" },
      { id: 33, name: "ブーファンディスティカ", group: "codex", interval: 20, lastWatered: "2026-02-04", rule: "20日目安", note: "" },
      { id: 34, name: "二ノ宮ブーファンディスティカ", group: "codex", interval: 20, lastWatered: "2026-02-04", rule: "20日目安", note: "" },
      { id: 35, name: "princspis", group: "codex", interval: 20, lastWatered: "2026-02-04", rule: "20日目安", note: "" },
      { id: 36, name: "恵比寿", group: "agave", interval: 10, lastWatered: "2026-02-04", rule: "10日目安", note: "" },
      { id: 37, name: "foetida", group: "agave", interval: 10, lastWatered: "2026-02-04", rule: "10日仮", note: "" },
      { id: 38, name: "亀甲竜", group: "codex", interval: 10, lastWatered: "2026-02-04", rule: "10日仮", note: "" },
      { id: 39, name: "イネルミス", group: "cactus", interval: 10, lastWatered: "2026-02-04", rule: "10日目安", note: "" },
      { id: 40, name: "エノプラ", group: "cactus", interval: 10, lastWatered: "2026-02-04", rule: "10日目安", note: "" },
      { id: 41, name: "ホリダブルースノー", group: "mediumagave", interval: 20, lastWatered: "2026-02-04", rule: "20日目安", note: "" }
    ];

    const defaultLogs = [
      { id: 1, date: "2026-03-10", plantId: 1, type: "水", memo: "" },
      { id: 2, date: "2026-03-10", plantId: 2, type: "水", memo: "" },
      { id: 3, date: "2026-03-10", plantId: 3, type: "水", memo: "" },
      { id: 4, date: "2026-03-10", plantId: 4, type: "水", memo: "" },
      { id: 5, date: "2026-03-10", plantId: 5, type: "HB", memo: "" }
    ];

    const savedPlants = JSON.parse(localStorage.getItem("plantManagerPlants") || "null");
    const savedLogs = JSON.parse(localStorage.getItem("plantManagerLogs") || "null");
    const savedJudgeDate = localStorage.getItem("plantManagerJudgeDate");

    let plants = savedPlants || defaultPlants;
    let logs = savedLogs || defaultLogs;
    let judgeDate = savedJudgeDate || new Date().toISOString().slice(0,10);

    const tabs = document.querySelectorAll(".tab-btn");
    const sections = {
      today: document.getElementById("tab-today"),
      plants: document.getElementById("tab-plants"),
      groups: document.getElementById("tab-groups"),
      logs: document.getElementById("tab-logs")
    };

    const judgeDateInput = document.getElementById("judgeDate");
    const statDue = document.getElementById("statDue");
    const statSoon = document.getElementById("statSoon");
    const statCount = document.getElementById("statCount");
    const statLogs = document.getElementById("statLogs");
    const todayContent = document.getElementById("todayContent");
    const plantsContent = document.getElementById("plantsContent");
    const groupsContent = document.getElementById("groupsContent");
    const logsContent = document.getElementById("logsContent");

    const newName = document.getElementById("newName");
    const newGroup = document.getElementById("newGroup");
    const newInterval = document.getElementById("newInterval");
    const newRule = document.getElementById("newRule");
    const newNote = document.getElementById("newNote");

    const searchInput = document.getElementById("searchInput");
    const groupFilter = document.getElementById("groupFilter");
    const dueOnlyCheck = document.getElementById("dueOnlyCheck");

    function saveData(){
      localStorage.setItem("plantManagerPlants", JSON.stringify(plants));
      localStorage.setItem("plantManagerLogs", JSON.stringify(logs));
      localStorage.setItem("plantManagerJudgeDate", judgeDate);
    }

    function daysBetween(a, b){
      const ms = 1000*60*60*24;
      const d1 = new Date(a);
      const d2 = new Date(b);
      d1.setHours(0,0,0,0);
      d2.setHours(0,0,0,0);
      return Math.floor((d2 - d1) / ms);
    }

    function addDays(dateStr, days){
      const d = new Date(dateStr);
      d.setDate(d.getDate() + Number(days));
      return d.toISOString().slice(0,10);
    }

    function statusForPlant(plant){
      const elapsed = daysBetween(plant.lastWatered, judgeDate);
      const dueIn = plant.interval - elapsed;
      if (dueIn <= 0) return { label: "今日やる", cls: "badge-due", elapsed, dueIn };
      if (dueIn === 1) return { label: "明日目安", cls: "badge-soon", elapsed, dueIn };
      return { label: "待機", cls: "badge-wait", elapsed, dueIn };
    }

    function buildSelectOptions(selectEl, includeAll=false){
      selectEl.innerHTML = "";
      if (includeAll){
        const op = document.createElement("option");
        op.value = "all";
        op.textContent = "すべて";
        selectEl.appendChild(op);
      }
      Object.entries(groupLabels).forEach(([key, label]) => {
        const op = document.createElement("option");
        op.value = key;
        op.textContent = label;
        selectEl.appendChild(op);
      });
    }

    function markPlant(id, type){
      const plant = plants.find(p => p.id === id);
      if (!plant) return;
      plant.lastWatered = judgeDate;
      logs.unshift({
        id: Date.now() + Math.random(),
        date: judgeDate,
        plantId: id,
        type,
        memo: ""
      });
      saveData();
      render();
    }

    function markAllDue(type){
      const duePlants = plants.filter(p => statusForPlant(p).dueIn <= 0);
      duePlants.forEach(p => {
        p.lastWatered = judgeDate;
        logs.unshift({
          id: Date.now() + Math.random(),
          date: judgeDate,
          plantId: p.id,
          type,
          memo: ""
        });
      });
      saveData();
      render();
    }

    function movePlant(id, direction){
      const idx = plants.findIndex(p => p.id === id);
      if (idx < 0) return;
      const newIdx = direction === "up" ? idx - 1 : idx + 1;
      if (newIdx < 0 || newIdx >= plants.length) return;
      const temp = plants[idx];
      plants[idx] = plants[newIdx];
      plants[newIdx] = temp;
      saveData();
      render();
    }

    function deletePlant(id){
      plants = plants.filter(p => p.id !== id);
      logs = logs.filter(l => l.plantId !== id);
      saveData();
      render();
    }

    function addPlant(){
      const name = newName.value.trim();
      if (!name) return alert("株名を入れて");
      plants.push({
        id: Date.now(),
        name,
        group: newGroup.value,
        interval: Number(newInterval.value || 7),
        lastWatered: judgeDate,
        rule: newRule.value.trim(),
        note: newNote.value.trim()
      });
      newName.value = "";
      newInterval.value = "";
      newRule.value = "";
      newNote.value = "";
      saveData();
      render();
    }

    function renderStats(){
      const dueToday = plants.filter(p => statusForPlant(p).dueIn <= 0).length;
      const soon = plants.filter(p => statusForPlant(p).dueIn === 1).length;
      statDue.textContent = dueToday;
      statSoon.textContent = soon;
      statCount.textContent = plants.length;
      statLogs.textContent = logs.length;
    }

    function renderToday(){
      const grouped = {};
      Object.keys(groupLabels).forEach(g => grouped[g] = []);
      plants.forEach(p => {
        const st = statusForPlant(p);
        if (st.dueIn <= 0) grouped[p.group].push({ ...p, st });
      });

      let html = "";
      const hasAny = Object.values(grouped).some(arr => arr.length > 0);

      if (!hasAny){
        todayContent.innerHTML = '<div class="empty">今日は水やり候補なし</div>';
        return;
      }

      Object.entries(grouped).forEach(([groupKey, items]) => {
        if (!items.length) return;
        html += `<div class="group-block">
          <div class="group-name">${groupLabels[groupKey]}</div>
          <div class="plant-grid">`;

        items.forEach(p => {
          html += `
            <div class="plant-card">
              <div class="plant-top">
                <div>
                  <div class="plant-name">${escapeHtml(p.name)}</div>
                  <div class="rule">${escapeHtml(p.rule || "")}</div>
                </div>
                <span class="badge ${p.st.cls}">${p.st.label}</span>
              </div>
              <div class="meta">
                <div class="meta-box">前回<b>${p.lastWatered}</b></div>
                <div class="meta-box">経過<b>${p.st.elapsed}日</b></div>
                <div class="meta-box">今の空き日数<b>${p.interval}日</b></div>
                <div class="meta-box">次回目安<b>${addDays(p.lastWatered, p.interval)}</b></div>
              </div>
              <div class="btn-row">
                <button class="primary" onclick="markPlant(${p.id}, '水')">水</button>
                <button class="secondary" onclick="markPlant(${p.id}, 'HB')">HB</button>
                <button class="secondary" onclick="markPlant(${p.id}, 'RD')">RD</button>
              </div>
            </div>`;
        });

        html += `</div></div>`;
      });

      todayContent.innerHTML = html;
    }

    function renderPlants(){
      const q = searchInput.value.trim().toLowerCase();
      const filterGroup = groupFilter.value;
      const dueOnly = dueOnlyCheck.checked;

      let list = plants.filter(p => {
        const inText =
          p.name.toLowerCase().includes(q) ||
          (p.rule || "").toLowerCase().includes(q) ||
          (p.note || "").toLowerCase().includes(q);
        const inGroup = filterGroup === "all" ? true : p.group === filterGroup;
        const inDue = dueOnly ? statusForPlant(p).dueIn <= 0 : true;
        return inText && inGroup && inDue;
      });

      if (!list.length){
        plantsContent.innerHTML = '<div class="empty">該当する株なし</div>';
        return;
      }

      plantsContent.innerHTML = list.map(p => {
        const st = statusForPlant(p);
        return `
          <div class="card list-card">
            <div class="list-head">
              <div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
                  <div style="font-size:20px;font-weight:800;">${escapeHtml(p.name)}</div>
                  <span class="badge badge-wait">${groupLabels[p.group]}</span>
                  <span class="badge ${st.cls}">${st.label}</span>
                </div>
                <div class="rule">${escapeHtml(p.rule || "")}</div>
                <div class="note">${escapeHtml(p.note || "")}</div>
              </div>
            </div>

            <div class="meta" style="margin-top:12px;">
              <div class="meta-box">前回<b>${p.lastWatered}</b></div>
              <div class="meta-box">経過<b>${st.elapsed}日</b></div>
              <div class="meta-box">今の空き日数
                <b style="margin-bottom:8px;">${p.interval}日</b>
                <input type="number" value="${p.interval}" onchange="updateInterval(${p.id}, this.value)" />
              </div>
              <div class="meta-box">次回目安<b>${addDays(p.lastWatered, p.interval)}</b></div>
            </div>

            <div class="plant-actions">
              <button class="secondary" onclick="movePlant(${p.id}, 'up')">↑</button>
              <button class="secondary" onclick="movePlant(${p.id}, 'down')">↓</button>
              <select onchange="updateGroup(${p.id}, this.value)">
                ${Object.entries(groupLabels).map(([key, label]) =>
                  `<option value="${key}" ${p.group === key ? "selected" : ""}>${label}</option>`
                ).join("")}
              </select>
              <button class="primary" onclick="markPlant(${p.id}, '水')">水</button>
              <button class="danger" onclick="deletePlant(${p.id})">削除</button>
            </div>
          </div>`;
      }).join("");
    }

    function renderGroups(){
      let html = "";
      Object.entries(groupLabels).forEach(([key, label]) => {
        const items = plants.filter(p => p.group === key);
        html += `<div class="card" style="margin-bottom:14px;">
          <div class="section-title">${label} <span class="small">(${items.length}株)</span></div>`;
        if (!items.length){
          html += `<div class="empty">登録なし</div>`;
        } else {
          items.forEach(p => {
            const st = statusForPlant(p);
            html += `
              <div class="log-item">
                <div>
                  <div style="font-weight:700;">${escapeHtml(p.name)}</div>
                  <div class="small">${escapeHtml(p.rule || "")}</div>
                </div>
                <span class="badge ${st.cls}">${st.label}</span>
              </div>`;
          });
        }
        html += `</div>`;
      });
      groupsContent.innerHTML = html;
    }

    function renderLogs(){
      if (!logs.length){
        logsContent.innerHTML = '<div class="empty">履歴なし</div>';
        return;
      }
      logsContent.innerHTML = logs.map(log => {
        const plant = plants.find(p => p.id === log.plantId);
        return `
          <div class="log-item">
            <div>
              <div style="font-weight:700;">${escapeHtml(plant ? plant.name : "不明な株")}</div>
              <div class="small">${log.date}</div>
            </div>
            <span class="badge badge-wait">${escapeHtml(log.type)}</span>
          </div>`;
      }).join("");
    }

    function updateInterval(id, value){
      const plant = plants.find(p => p.id === id);
      if (!plant) return;
      plant.interval = Number(value || 0);
      saveData();
      render();
    }

    function updateGroup(id, value){
      const plant = plants.find(p => p.id === id);
      if (!plant) return;
      plant.group = value;
      saveData();
      render();
    }

    function escapeHtml(text){
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render(){
      renderStats();
      renderToday();
      renderPlants();
      renderGroups();
      renderLogs();
    }

    tabs.forEach(btn => {
      btn.addEventListener("click", () => {
        tabs.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        Object.values(sections).forEach(sec => sec.classList.add("hidden"));
        sections[btn.dataset.tab].classList.remove("hidden");
      });
    });

    judgeDateInput.value = judgeDate;
    judgeDateInput.addEventListener("change", e => {
      judgeDate = e.target.value;
      saveData();
      render();
    });

    document.getElementById("waterAllBtn").addEventListener("click", () => markAllDue("水"));
    document.getElementById("hbAllBtn").addEventListener("click", () => markAllDue("HB"));
    document.getElementById("rdAllBtn").addEventListener("click", () => markAllDue("RD"));
    document.getElementById("addPlantBtn").addEventListener("click", addPlant);
    document.getElementById("clearSearchBtn").addEventListener("click", () => {
      searchInput.value = "";
      groupFilter.value = "all";
      dueOnlyCheck.checked = false;
      render();
    });

    searchInput.addEventListener("input", render);
    groupFilter.addEventListener("change", render);
    dueOnlyCheck.addEventListener("change", render);

    buildSelectOptions(newGroup, false);
    buildSelectOptions(groupFilter, true);
    groupFilter.value = "all";

    render();
  </script>
</body>
</html>
