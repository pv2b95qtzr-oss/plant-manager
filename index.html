<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>植物管理アプリ Final</title>
  <style>
    :root{
      --bg:#f4f6f8;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;
      --blue:#2563eb;--green:#059669;--orange:#d97706;--red:#dc2626;--purple:#7c3aed;
      --shadow:0 6px 18px rgba(15,23,42,.08);--radius:18px;
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);max-width:1100px;margin:0 auto;padding:16px 16px 92px}
    h1,h2,h3,p{margin:0} button,input,select,textarea{font:inherit}
    input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text)}
    button{border:none;cursor:pointer;padding:12px 14px;border-radius:14px;min-height:46px}
    .primary{background:var(--blue);color:#fff}.secondary{background:#fff;border:1px solid var(--line)}.danger{background:var(--red);color:#fff}.spray{background:var(--purple);color:#fff}.success{background:var(--green);color:#fff}
    .top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}.title{font-size:28px;font-weight:800}.sub{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.5}
    .date-box,.card,.add-box{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius)}
    .date-box{padding:14px 16px;min-width:220px}.date-box label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    .grid-4,.toolbar,.history-toolbar,.add-grid,.add-grid-2,.meta,.btn-row,.quick-grid,.config-grid{display:grid;gap:10px}
    .grid-4{grid-template-columns:repeat(4,1fr);margin-bottom:16px}.card{padding:16px}.stat-label{font-size:12px;color:var(--muted);margin-bottom:6px}.stat-value{font-size:32px;font-weight:800}
    .section-title{font-size:20px;font-weight:800;margin-bottom:12px}.small{font-size:13px;color:var(--muted)}
    .tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(244,246,248,.96);padding:12px;backdrop-filter:blur(10px);max-width:1100px;margin:0 auto}
    .tab-btn{background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:16px;padding:12px 8px;font-size:15px;font-weight:700}.tab-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .hidden{display:none !important}.top-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.add-box{padding:16px;margin-bottom:14px}
    .toolbar{grid-template-columns:1.5fr 1fr auto auto}.history-toolbar{grid-template-columns:1fr 180px 180px auto}.add-grid{grid-template-columns:1fr 1fr 1fr}.add-grid-2{grid-template-columns:1fr 1fr}.quick-grid{grid-template-columns:repeat(3,1fr)}.config-grid{grid-template-columns:repeat(2,1fr)}
    .group-tags{display:flex;flex-wrap:wrap;gap:8px}.tag{padding:12px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-weight:700}.tag.active{background:var(--blue);border-color:var(--blue);color:#fff}
    .group-block{margin-top:18px}.group-name{font-size:14px;font-weight:800;color:var(--muted);margin:0 0 8px 4px}.plant-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .plant-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow)}.plant-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}.plant-name{font-size:18px;font-weight:800;line-height:1.25}
    .badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;white-space:nowrap}.badge-due{background:#fee2e2;color:#991b1b}.badge-soon{background:#fef3c7;color:#92400e}.badge-wait{background:#e5e7eb;color:#374151}.badge-spray{background:#ede9fe;color:#5b21b6}
    .meta{grid-template-columns:repeat(2,1fr);margin-bottom:10px}.meta-box{background:#f8fafc;border-radius:14px;padding:10px;font-size:13px;line-height:1.4}.meta-box b{display:block;font-size:15px;margin-top:3px;color:#111827}
    .btn-row{grid-template-columns:repeat(3,1fr)}.list-card{margin-bottom:12px}.list-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.rule{font-size:13px;color:var(--muted);margin-top:4px}.note{font-size:13px;color:#4b5563;margin-top:4px}
    .plant-actions{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-top:12px}.log-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff;margin-bottom:10px}.log-actions{display:flex;gap:8px;flex-wrap:wrap}
    .empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:24px;text-align:center;color:var(--muted)}.pill{background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700}
    .stack{display:flex;flex-direction:column;gap:12px}.divider{height:1px;background:var(--line);margin:8px 0}
    .modal-wrap{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:flex-end;justify-content:center;padding:12px;z-index:50}.modal-wrap.show{display:flex}.modal{width:min(860px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:24px 24px 18px 18px;box-shadow:0 24px 80px rgba(0,0,0,.25);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.modal-title{font-size:22px;font-weight:800}.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.footer-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
    .check-list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.check-item{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:12px}.check-item.off{opacity:.45}
    @media (max-width:800px){body{padding:12px 12px 96px}.title{font-size:24px}.grid-4,.top-actions,.toolbar,.history-toolbar,.add-grid,.add-grid-2,.meta,.btn-row,.plant-actions,.modal-grid,.plant-grid,.quick-grid,.config-grid,.check-list{grid-template-columns:1fr}.tabs{grid-template-columns:repeat(5,1fr);padding:10px}.tab-btn{font-size:13px;padding:10px 6px}}
  </style>
</head>
<body>
  <div class="top">
    <div>
      <div class="title">植物管理アプリ</div>
      <div class="sub">水・液体処理・薬剤を分けて管理。今日の候補、一括入力、履歴、植物管理、設定をiPhoneで扱いやすく。</div>
    </div>
    <div class="date-box">
      <label>判定日</label>
      <input type="date" id="judgeDate" />
    </div>
  </div>

  <div class="grid-4">
    <div class="card"><div class="stat-label">今日やる水</div><div class="stat-value" id="statWaterDue">0</div></div>
    <div class="card"><div class="stat-label">今日やる液体処理</div><div class="stat-value" id="statLiquidDue">0</div></div>
    <div class="card"><div class="stat-label">今日やる薬剤</div><div class="stat-value" id="statSprayDue">0</div></div>
    <div class="card"><div class="stat-label">登録株数</div><div class="stat-value" id="statCount">0</div></div>
  </div>

  <section id="tab-today">
    <div class="card">
      <div class="section-title">今日</div>
      <div id="todayContent"></div>
    </div>
  </section>

  <section id="tab-bulk" class="hidden">
    <div class="card">
      <div class="section-title">一括</div>
      <div class="stack">
        <div>
          <div class="small" style="margin-bottom:8px;">グループを複数選択</div>
          <div class="group-tags" id="bulkGroupTags"></div>
        </div>
        <div class="add-grid">
          <select id="bulkMode">
            <option value="water">水</option>
            <option value="liquid">液体処理</option>
            <option value="spray">薬剤</option>
          </select>
          <select id="bulkLiquidSelect"></select>
          <select id="bulkSpraySelect"></select>
        </div>
        <div class="add-grid-2">
          <input id="bulkDate" type="date" />
          <input id="bulkMemo" placeholder="メモ・倍率など" />
        </div>
        <button class="primary" id="bulkPreviewBtn">完了</button>
      </div>
    </div>
  </section>

  <section id="tab-history" class="hidden">
    <div class="card">
      <div class="section-title">履歴</div>
      <div class="toolbar">
        <input id="historySearch" placeholder="株名・内容検索" />
        <select id="historyTypeFilter"><option value="all">すべて</option><option value="water">水</option><option value="liquid">液体処理</option><option value="spray">薬剤</option></select>
        <select id="historyPlantFilter"></select>
        <button class="secondary" id="clearHistoryBtn">クリア</button>
      </div>
      <div id="historyContent"></div>
    </div>
  </section>

  <section id="tab-plants" class="hidden">
    <div class="add-box">
      <div class="section-title">株追加</div>
      <div class="add-grid">
        <input id="newPlantName" placeholder="株名" />
        <select id="newPlantGroup"></select>
        <input id="newPlantNote" placeholder="メモ" />
      </div>
      <div class="divider"></div>
      <div class="section-title" style="font-size:18px;">水設定</div>
      <div class="add-grid">
        <input id="newWaterInterval" type="number" placeholder="水の空き日数" />
        <input id="newWaterLast" type="date" />
        <div></div>
      </div>
      <div class="section-title" style="font-size:18px;">液体処理設定</div>
      <div id="newLiquidSettings" class="stack"></div>
      <div class="section-title" style="font-size:18px;">薬剤設定</div>
      <div id="newSpraySettings" class="stack"></div>
      <div style="margin-top:10px;"><button class="primary" id="addPlantBtn">追加する</button></div>
    </div>
    <div class="card">
      <div class="section-title">植物</div>
      <div class="toolbar">
        <input id="plantSearch" placeholder="株名・メモ検索" />
        <select id="plantGroupFilter"></select>
        <label style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:0 12px;"><input type="checkbox" id="plantDueOnly" style="width:auto;" /><span>今日候補のみ</span></label>
        <button class="secondary" id="clearPlantFilterBtn">クリア</button>
      </div>
      <div id="plantsContent"></div>
    </div>
  </section>

  <section id="tab-settings" class="hidden">
    <div class="config-grid">
      <div class="card">
        <div class="section-title">グループ設定</div>
        <div class="add-grid-2">
          <input id="newGroupName" placeholder="新しいグループ名" />
          <button class="primary" id="addGroupBtn">グループ追加</button>
        </div>
        <div id="groupSettingsList" class="stack" style="margin-top:12px;"></div>
      </div>
      <div class="card">
        <div class="section-title">液体処理マスター</div>
        <div class="add-grid-2">
          <input id="newLiquidName" placeholder="液体処理名" />
          <button class="primary" id="addLiquidBtn">追加</button>
        </div>
        <div id="liquidMasterList" class="stack" style="margin-top:12px;"></div>
        <div class="divider"></div>
        <div class="section-title">薬剤マスター</div>
        <div class="add-grid-2">
          <input id="newSprayName" placeholder="薬剤名" />
          <button class="primary" id="addSprayMasterBtn">追加</button>
        </div>
        <div class="add-grid-2" style="margin-top:10px;">
          <input id="newSprayDefaultDilution" placeholder="初期倍率" />
          <div></div>
        </div>
        <div id="sprayMasterList" class="stack" style="margin-top:12px;"></div>
      </div>
    </div>
  </section>

  <div class="tabs">
    <button class="tab-btn active" data-tab="today">今日</button>
    <button class="tab-btn" data-tab="bulk">一括</button>
    <button class="tab-btn" data-tab="history">履歴</button>
    <button class="tab-btn" data-tab="plants">植物</button>
    <button class="tab-btn" data-tab="settings">設定</button>
  </div>

  <div class="modal-wrap" id="modalWrap"><div class="modal"><div class="modal-head"><div class="modal-title" id="modalTitle">確認</div><button class="secondary" id="closeModalBtn">閉じる</button></div><div id="modalBody"></div></div></div>

  <script>
    const defaults = {
      groups:[
        {id:'smallagave',name:'smallagave'},{id:'mediumagave',name:'mediumagave'},{id:'agave',name:'agave'},{id:'wildagave',name:'wildagave'},{id:'cactus',name:'cactus'},{id:'codex',name:'codex'},{id:'euphorbia',name:'euphorbia'},{id:'other',name:'other'}
      ],
      liquidMasters:[{id:'hb',name:'HB'},{id:'rd',name:'RD'}],
      sprayMasters:[{id:'benlate',name:'ベンレート',defaultDilution:'2000倍'},{id:'daconil',name:'ダコニール',defaultDilution:'1000倍'}],
      groupSettings:{
        smallagave:{water:3,liquid:{hb:7,rd:14},spray:{benlate:30,daconil:21}},
        mediumagave:{water:7,liquid:{hb:14,rd:21},spray:{benlate:30,daconil:21}},
        agave:{water:10,liquid:{hb:14,rd:21},spray:{benlate:30,daconil:21}},
        wildagave:{water:14,liquid:{hb:21,rd:30},spray:{benlate:45,daconil:30}},
        cactus:{water:20,liquid:{hb:30,rd:40},spray:{benlate:45,daconil:30}},
        codex:{water:10,liquid:{hb:20,rd:30},spray:{benlate:45,daconil:30}},
        euphorbia:{water:14,liquid:{hb:21,rd:30},spray:{benlate:45,daconil:30}},
        other:{water:7,liquid:{hb:14,rd:21},spray:{benlate:30,daconil:21}}
      },
      plants:[
        {id:1,name:'GG compacta',groupId:'mediumagave',note:'',water:{interval:7,last:'2026-03-10'},liquid:{hb:{interval:14,last:'2026-03-10'},rd:{interval:21,last:'2026-03-10'}},spray:{benlate:{interval:30,last:'2026-03-01'}}},
        {id:2,name:'萬代厳竜',groupId:'mediumagave',note:'',water:{interval:7,last:'2026-03-10'},liquid:{hb:{interval:14,last:'2026-03-10'},rd:{interval:21,last:'2026-03-10'}},spray:{benlate:{interval:30,last:'2026-03-01'}}},
        {id:3,name:'FO076',groupId:'smallagave',note:'',water:{interval:4,last:'2026-03-10'},liquid:{hb:{interval:9,last:'2026-03-10'},rd:{interval:14,last:'2026-03-10'}},spray:{benlate:{interval:30,last:'2026-03-01'}}},
        {id:4,name:'ripple effect',groupId:'smallagave',note:'タイミングずらすことあり',water:{interval:3,last:'2026-03-10'},liquid:{hb:{interval:7,last:'2026-03-10'},rd:{interval:14,last:'2026-03-10'}},spray:{benlate:{interval:30,last:'2026-03-01'}}}
      ],
      history:[]
    };

    const storageKeys={groups:'pm_groups',liquid:'pm_liquid_masters',spray:'pm_spray_masters',groupSettings:'pm_group_settings',plants:'pm_plants',history:'pm_history',judgeDate:'pm_judge_date'};
    const load=(k,f)=>{try{const raw=localStorage.getItem(k);return raw?JSON.parse(raw):f}catch(e){return f}};
    let groups=load(storageKeys.groups,defaults.groups);
    let liquidMasters=load(storageKeys.liquid,defaults.liquidMasters);
    let sprayMasters=load(storageKeys.spray,defaults.sprayMasters);
    let groupSettings=load(storageKeys.groupSettings,defaults.groupSettings);
    let plants=load(storageKeys.plants,defaults.plants);
    let history=load(storageKeys.history,defaults.history);
    let judgeDate=localStorage.getItem(storageKeys.judgeDate)||new Date().toISOString().slice(0,10);
    let bulkSelectedGroups=[];

    const $ = (id)=>document.getElementById(id);
    const tabs=document.querySelectorAll('.tab-btn');
    const sections={today:$('tab-today'),bulk:$('tab-bulk'),history:$('tab-history'),plants:$('tab-plants'),settings:$('tab-settings')};

    function saveAll(){localStorage.setItem(storageKeys.groups,JSON.stringify(groups));localStorage.setItem(storageKeys.liquid,JSON.stringify(liquidMasters));localStorage.setItem(storageKeys.spray,JSON.stringify(sprayMasters));localStorage.setItem(storageKeys.groupSettings,JSON.stringify(groupSettings));localStorage.setItem(storageKeys.plants,JSON.stringify(plants));localStorage.setItem(storageKeys.history,JSON.stringify(history));localStorage.setItem(storageKeys.judgeDate,judgeDate)}
    function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
    function daysBetween(a,b){const d1=new Date(a),d2=new Date(b);d1.setHours(0,0,0,0);d2.setHours(0,0,0,0);return Math.floor((d2-d1)/(1000*60*60*24))}
    function addDays(dateStr,days){const d=new Date(dateStr);d.setDate(d.getDate()+Number(days));return d.toISOString().slice(0,10)}
    function groupName(id){const g=groups.find(x=>x.id===id);return g?g.name:id}
    function plantName(id){const p=plants.find(x=>x.id===id);return p?p.name:'不明な株'}
    function openModal(title,html){$('modalTitle').textContent=title;$('modalBody').innerHTML=html;$('modalWrap').classList.add('show')}
    function closeModal(){$('modalWrap').classList.remove('show');$('modalBody').innerHTML=''}

    function ensurePlantStructure(plant){plant.water=plant.water||{interval:getGroupWaterDefault(plant.groupId),last:judgeDate};plant.liquid=plant.liquid||{};plant.spray=plant.spray||{};liquidMasters.forEach(m=>{if(!plant.liquid[m.id]) plant.liquid[m.id]={interval:getGroupLiquidDefault(plant.groupId,m.id),last:plant.water.last}});sprayMasters.forEach(m=>{if(!plant.spray[m.id]) plant.spray[m.id]={interval:getGroupSprayDefault(plant.groupId,m.id),last:plant.water.last}})}
    plants.forEach(ensurePlantStructure);

    function getGroupWaterDefault(groupId){return groupSettings[groupId]?.water ?? 7}
    function getGroupLiquidDefault(groupId,liquidId){return groupSettings[groupId]?.liquid?.[liquidId] ?? 14}
    function getGroupSprayDefault(groupId,sprayId){return groupSettings[groupId]?.spray?.[sprayId] ?? 30}
    function status(last,interval,label){const elapsed=daysBetween(last,judgeDate),dueIn=interval-elapsed;if(dueIn<=0)return{label:`今日${label}`,cls:'badge-due',elapsed,dueIn};if(dueIn===1)return{label:`明日${label}`,cls:'badge-soon',elapsed,dueIn};return{label:`${label}待機`,cls:'badge-wait',elapsed,dueIn}}

    function addHistory(entry){history.unshift({id:Date.now()+Math.random(),...entry})}
    function applyActionToPlant(plant,mode,selectedId,date,memo){if(mode==='water'){plant.water.last=date;addHistory({date,plantId:plant.id,category:'water',label:'水',memo})}
      if(mode==='liquid'){plant.liquid[selectedId].last=date;const label=liquidMasters.find(x=>x.id===selectedId)?.name||selectedId;addHistory({date,plantId:plant.id,category:'liquid',subId:selectedId,label,memo})}
      if(mode==='spray'){plant.spray[selectedId].last=date;const master=sprayMasters.find(x=>x.id===selectedId);addHistory({date,plantId:plant.id,category:'spray',subId:selectedId,label:master?.name||selectedId,memo})}}

    function renderStats(){const waterDue=plants.filter(p=>status(p.water.last,p.water.interval,'水').dueIn<=0).length;let liquidDue=0,sprayDue=0;plants.forEach(p=>{liquidMasters.forEach(m=>{if(status(p.liquid[m.id].last,p.liquid[m.id].interval,m.name).dueIn<=0) liquidDue++});sprayMasters.forEach(m=>{if(status(p.spray[m.id].last,p.spray[m.id].interval,m.name).dueIn<=0) sprayDue++})});$('statWaterDue').textContent=waterDue;$('statLiquidDue').textContent=liquidDue;$('statSprayDue').textContent=sprayDue;$('statCount').textContent=plants.length}

    function renderToday(){
      const waterItems=[], liquidItems=[], sprayItems=[];
      plants.forEach(p=>{const ws=status(p.water.last,p.water.interval,'水');if(ws.dueIn<=0) waterItems.push({plant:p,st:ws,label:'水',interval:p.water.interval,last:p.water.last});liquidMasters.forEach(m=>{const s=status(p.liquid[m.id].last,p.liquid[m.id].interval,m.name);if(s.dueIn<=0) liquidItems.push({plant:p,st:s,label:m.name,interval:p.liquid[m.id].interval,last:p.liquid[m.id].last})});sprayMasters.forEach(m=>{const s=status(p.spray[m.id].last,p.spray[m.id].interval,m.name);if(s.dueIn<=0) sprayItems.push({plant:p,st:s,label:m.name,interval:p.spray[m.id].interval,last:p.spray[m.id].last})})});
      function block(title,items,kind){return `<div class='group-block'><div class='group-name'>${title}</div>${items.length?`<div class='plant-grid'>${items.map(i=>`<div class='plant-card'><div class='plant-top'><div><div class='plant-name'>${esc(i.plant.name)}</div><div class='rule'>${groupName(i.plant.groupId)}</div><div class='small'><span class='pill'>${esc(i.label)}</span></div></div><span class='badge ${i.st.cls}'>${i.st.label}</span></div><div class='meta'><div class='meta-box'>前回<b>${i.last}</b></div><div class='meta-box'>経過<b>${i.st.elapsed}日</b></div><div class='meta-box'>空き日数<b>${i.interval}日</b></div><div class='meta-box'>次回目安<b>${addDays(i.last,i.interval)}</b></div></div><div class='btn-row'>${kind==='water'?`<button class='primary' onclick='quickApply(${i.plant.id},"water")'>記録</button><button class='secondary' onclick='openPlantEdit(${i.plant.id})'>編集</button><button class='secondary' onclick='noop()'>-</button>`:kind==='liquid'?`<button class='primary' onclick='quickApply(${i.plant.id},"liquid","${i.label}")'>記録</button><button class='secondary' onclick='openPlantEdit(${i.plant.id})'>編集</button><button class='secondary' onclick='noop()'>-</button>`:`<button class='spray' onclick='quickApply(${i.plant.id},"spray","${i.label}")'>記録</button><button class='secondary' onclick='openPlantEdit(${i.plant.id})'>編集</button><button class='secondary' onclick='noop()'>-</button>`}</div></div>`).join('')}</div>`:`<div class='empty'>候補なし</div>`}</div>`}
      $('todayContent').innerHTML=block('水',waterItems,'water')+block('液体処理',liquidItems,'liquid')+block('薬剤',sprayItems,'spray');
    }

    function renderBulk(){
      const container=$('bulkGroupTags');container.innerHTML='';groups.forEach(g=>{const btn=document.createElement('button');btn.className='tag'+(bulkSelectedGroups.includes(g.id)?' active':'');btn.textContent=g.name;btn.onclick=()=>{bulkSelectedGroups=bulkSelectedGroups.includes(g.id)?bulkSelectedGroups.filter(x=>x!==g.id):[...bulkSelectedGroups,g.id];renderBulk()};container.appendChild(btn)});
      $('bulkDate').value=judgeDate;
      $('bulkLiquidSelect').innerHTML=liquidMasters.map(m=>`<option value='${m.id}'>${esc(m.name)}</option>`).join('');
      $('bulkSpraySelect').innerHTML=sprayMasters.map(m=>`<option value='${m.id}'>${esc(m.name)} / ${esc(m.defaultDilution||'')}</option>`).join('');
      const mode=$('bulkMode').value;$('bulkLiquidSelect').style.display=mode==='liquid'?'block':'none';$('bulkSpraySelect').style.display=mode==='spray'?'block':'none';
    }

    function renderHistory(){const q=$('historySearch').value.trim().toLowerCase(),type=$('historyTypeFilter').value,pf=$('historyPlantFilter').value;$('historyPlantFilter').innerHTML=`<option value='all'>株すべて</option>${plants.map(p=>`<option value='${p.id}'>${esc(p.name)}</option>`).join('')}`;const list=history.filter(h=>{const matchText=plantName(h.plantId).toLowerCase().includes(q)||String(h.label||'').toLowerCase().includes(q)||String(h.memo||'').toLowerCase().includes(q);const matchType=type==='all'||h.category===type;const matchPlant=pf==='all'||String(h.plantId)===pf;return matchText&&matchType&&matchPlant});$('historyContent').innerHTML=list.length?list.map(h=>`<div class='log-item'><div><div style='font-weight:700;'>${esc(plantName(h.plantId))}</div><div class='small'>${h.date} / ${esc(h.label)} / ${esc(h.memo||'')}</div></div><div class='log-actions'><span class='badge ${h.category==='spray'?'badge-spray':'badge-wait'}'>${h.category==='water'?'水':h.category==='liquid'?'液体処理':'薬剤'}</span><button class='secondary' onclick='openHistoryEdit(${JSON.stringify(h.id)})'>編集</button></div></div>`).join(''):`<div class='empty'>履歴なし</div>`}

    function renderNewPlantDynamic(){
      $('newPlantGroup').innerHTML=groups.map(g=>`<option value='${g.id}'>${esc(g.name)}</option>`).join('');
      const gid=$('newPlantGroup').value||groups[0]?.id;
      $('newWaterLast').value=judgeDate;
      $('newWaterInterval').value=getGroupWaterDefault(gid);
      $('newLiquidSettings').innerHTML=liquidMasters.map(m=>`<div class='add-grid'><div>${esc(m.name)}</div><input id='new-liquid-interval-${m.id}' type='number' value='${getGroupLiquidDefault(gid,m.id)}' placeholder='空き日数'><input id='new-liquid-last-${m.id}' type='date' value='${judgeDate}'></div>`).join('');
      $('newSpraySettings').innerHTML=sprayMasters.map(m=>`<div class='add-grid'><div>${esc(m.name)}<div class='small'>初期倍率: ${esc(m.defaultDilution||'-')}</div></div><input id='new-spray-interval-${m.id}' type='number' value='${getGroupSprayDefault(gid,m.id)}' placeholder='空き日数'><input id='new-spray-last-${m.id}' type='date' value='${judgeDate}'></div>`).join('');
    }

    function renderPlants(){
      $('plantGroupFilter').innerHTML=`<option value='all'>すべて</option>${groups.map(g=>`<option value='${g.id}'>${esc(g.name)}</option>`).join('')}`;
      const q=$('plantSearch').value.trim().toLowerCase(),gf=$('plantGroupFilter').value,dueOnly=$('plantDueOnly').checked;
      const list=plants.filter(p=>{const text=p.name.toLowerCase().includes(q)||String(p.note||'').toLowerCase().includes(q);const groupOk=gf==='all'||p.groupId===gf;const due=!dueOnly||status(p.water.last,p.water.interval,'水').dueIn<=0||liquidMasters.some(m=>status(p.liquid[m.id].last,p.liquid[m.id].interval,m.name).dueIn<=0)||sprayMasters.some(m=>status(p.spray[m.id].last,p.spray[m.id].interval,m.name).dueIn<=0);return text&&groupOk&&due});
      $('plantsContent').innerHTML=list.length?list.map(p=>`<div class='card list-card'><div class='list-head'><div><div style='display:flex;flex-wrap:wrap;gap:8px;align-items:center;'><div style='font-size:20px;font-weight:800;'>${esc(p.name)}</div><span class='badge badge-wait'>${esc(groupName(p.groupId))}</span></div><div class='note'>${esc(p.note||'')}</div></div></div><div class='meta'><div class='meta-box'>水<b>${p.water.last}</b><input type='number' value='${p.water.interval}' onchange='updatePlantValue(${p.id},"waterInterval",this.value)'></div>${liquidMasters.map(m=>`<div class='meta-box'>${esc(m.name)}<b>${p.liquid[m.id].last}</b><input type='number' value='${p.liquid[m.id].interval}' onchange='updatePlantValue(${p.id},"liquid:${m.id}",this.value)'></div>`).join('')}${sprayMasters.map(m=>`<div class='meta-box'>${esc(m.name)}<b>${p.spray[m.id].last}</b><input type='number' value='${p.spray[m.id].interval}' onchange='updatePlantValue(${p.id},"spray:${m.id}",this.value)'></div>`).join('')}</div><div class='plant-actions'><button class='secondary' onclick='movePlant(${p.id},"up")'>↑</button><button class='secondary' onclick='movePlant(${p.id},"down")'>↓</button><select onchange='changePlantGroup(${p.id},this.value)'>${groups.map(g=>`<option value='${g.id}' ${p.groupId===g.id?'selected':''}>${esc(g.name)}</option>`).join('')}</select><button class='primary' onclick='quickApply(${p.id},"water")'>水</button><button class='secondary' onclick='openPlantEdit(${p.id})'>編集</button><button class='danger' onclick='deletePlant(${p.id})'>削除</button><button class='secondary' onclick='noop()'>-</button><button class='secondary' onclick='noop()'>-</button></div></div>`).join(''):`<div class='empty'>該当する株なし</div>`}
      renderNewPlantDynamic();
    }

    function renderSettings(){
      $('groupSettingsList').innerHTML=groups.map(g=>`<div class='card'><div class='add-grid'><input value='${esc(g.name)}' onchange='renameGroup("${g.id}",this.value)'><input type='number' value='${getGroupWaterDefault(g.id)}' onchange='updateGroupWater("${g.id}",this.value)'><button class='danger' onclick='deleteGroup("${g.id}")'>削除</button></div><div class='small'>水の初期空き日数</div></div>`).join('');
      $('liquidMasterList').innerHTML=liquidMasters.map(m=>`<div class='log-item'><div><div style='font-weight:700;'>${esc(m.name)}</div></div><div class='log-actions'><button class='danger' onclick='deleteLiquidMaster("${m.id}")'>削除</button></div></div>`).join('')||`<div class='empty'>液体処理なし</div>`;
      $('sprayMasterList').innerHTML=sprayMasters.map(m=>`<div class='log-item'><div><div style='font-weight:700;'>${esc(m.name)}</div><div class='small'>初期倍率: ${esc(m.defaultDilution||'-')}</div></div><div class='log-actions'><button class='secondary' onclick='openSprayMasterEdit("${m.id}")'>編集</button><button class='danger' onclick='deleteSprayMaster("${m.id}")'>削除</button></div></div>`).join('')||`<div class='empty'>薬剤なし</div>`;
    }

    function render(){plants.forEach(ensurePlantStructure);$('judgeDate').value=judgeDate;renderStats();renderToday();renderBulk();renderHistory();renderPlants();renderSettings()}

    function quickApply(plantId,mode,labelName){const plant=plants.find(p=>p.id===plantId);if(!plant)return;if(mode==='water')applyActionToPlant(plant,'water',null,judgeDate,'');if(mode==='liquid'){const master=liquidMasters.find(m=>m.name===labelName);if(master)applyActionToPlant(plant,'liquid',master.id,judgeDate,'')}if(mode==='spray'){const master=sprayMasters.find(m=>m.name===labelName);if(master)applyActionToPlant(plant,'spray',master.id,judgeDate,master.defaultDilution||'')}saveAll();render()}
    function updatePlantValue(id,key,val){const p=plants.find(x=>x.id===id);if(!p)return;if(key==='waterInterval')p.water.interval=Number(val||0);if(key.startsWith('liquid:'))p.liquid[key.split(':')[1]].interval=Number(val||0);if(key.startsWith('spray:'))p.spray[key.split(':')[1]].interval=Number(val||0);saveAll();render()}
    function changePlantGroup(id,gid){const p=plants.find(x=>x.id===id);if(!p)return;p.groupId=gid;saveAll();render()}
    function movePlant(id,dir){const i=plants.findIndex(p=>p.id===id),j=dir==='up'?i-1:i+1;if(i<0||j<0||j>=plants.length)return;[plants[i],plants[j]]=[plants[j],plants[i]];saveAll();render()}
    function deletePlant(id){if(!confirm('この株を削除する？'))return;plants=plants.filter(p=>p.id!==id);history=history.filter(h=>h.plantId!==id);saveAll();render()}
    function addPlantFromForm(){const name=$('newPlantName').value.trim();if(!name)return alert('株名を入れて');const groupId=$('newPlantGroup').value;const plant={id:Date.now(),name,groupId,note:$('newPlantNote').value.trim(),water:{interval:Number($('newWaterInterval').value||getGroupWaterDefault(groupId)),last:$('newWaterLast').value||judgeDate},liquid:{},spray:{}};liquidMasters.forEach(m=>plant.liquid[m.id]={interval:Number($("new-liquid-interval-"+m.id).value||getGroupLiquidDefault(groupId,m.id)),last:$("new-liquid-last-"+m.id).value||judgeDate});sprayMasters.forEach(m=>plant.spray[m.id]={interval:Number($("new-spray-interval-"+m.id).value||getGroupSprayDefault(groupId,m.id)),last:$("new-spray-last-"+m.id).value||judgeDate});plants.push(plant);$('newPlantName').value='';$('newPlantNote').value='';saveAll();render()}
    function renameGroup(id,name){const g=groups.find(x=>x.id===id);if(!g)return;g.name=name.trim()||g.name;saveAll();render()}
    function updateGroupWater(id,val){groupSettings[id]=groupSettings[id]||{water:7,liquid:{},spray:{}};groupSettings[id].water=Number(val||0);saveAll();render()}
    function addGroup(){const name=$('newGroupName').value.trim();if(!name)return;const id=name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now();groups.push({id,name});groupSettings[id]={water:7,liquid:{},spray:{}};$('newGroupName').value='';saveAll();render()}
    function deleteGroup(id){if(groups.length<=1)return alert('最低1つは必要');const target=groups.find(g=>g.id===id);if(!target)return;openModal('グループ削除',`<div class='stack'><div>${esc(target.name)} を削除します。所属株の移動先を選んでください。</div><select id='moveGroupTarget'>${groups.filter(g=>g.id!==id).map(g=>`<option value='${g.id}'>${esc(g.name)}</option>`).join('')}</select><div class='footer-actions'><button class='secondary' onclick='closeModal()'>キャンセル</button><button class='danger' onclick='confirmDeleteGroup("${id}")'>削除する</button></div></div>`)}
    function confirmDeleteGroup(id){const to=$('moveGroupTarget').value;plants.forEach(p=>{if(p.groupId===id)p.groupId=to});groups=groups.filter(g=>g.id!==id);delete groupSettings[id];saveAll();closeModal();render()}
    function addLiquidMaster(){const name=$('newLiquidName').value.trim();if(!name)return;const id=name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now();liquidMasters.push({id,name});groups.forEach(g=>{groupSettings[g.id]=groupSettings[g.id]||{water:7,liquid:{},spray:{}};groupSettings[g.id].liquid[id]=14});plants.forEach(p=>p.liquid[id]={interval:14,last:judgeDate});$('newLiquidName').value='';saveAll();render()}
    function deleteLiquidMaster(id){if(!confirm('この液体処理を削除する？'))return;liquidMasters=liquidMasters.filter(m=>m.id!==id);plants.forEach(p=>delete p.liquid[id]);groups.forEach(g=>{if(groupSettings[g.id]?.liquid) delete groupSettings[g.id].liquid[id]});saveAll();render()}
    function addSprayMaster(){const name=$('newSprayName').value.trim();if(!name)return;const id=name.toLowerCase().replace(/\s+/g,'-')+'-'+Date.now();const defaultDilution=$('newSprayDefaultDilution').value.trim();sprayMasters.push({id,name,defaultDilution});groups.forEach(g=>{groupSettings[g.id]=groupSettings[g.id]||{water:7,liquid:{},spray:{}};groupSettings[g.id].spray[id]=30});plants.forEach(p=>p.spray[id]={interval:30,last:judgeDate});$('newSprayName').value='';$('newSprayDefaultDilution').value='';saveAll();render()}
    function openSprayMasterEdit(id){const m=sprayMasters.find(x=>x.id===id);if(!m)return;openModal('薬剤編集',`<div class='modal-grid'><div><label>薬剤名</label><input id='editSprayName' value='${esc(m.name)}'></div><div><label>初期倍率</label><input id='editSprayDilution' value='${esc(m.defaultDilution||'')}'></div></div><div class='footer-actions'><button class='secondary' onclick='closeModal()'>キャンセル</button><button class='primary' onclick='saveSprayMasterEdit("${id}")'>保存</button></div>`)}
    function saveSprayMasterEdit(id){const m=sprayMasters.find(x=>x.id===id);if(!m)return;m.name=$('editSprayName').value.trim()||m.name;m.defaultDilution=$('editSprayDilution').value.trim();saveAll();closeModal();render()}
    function deleteSprayMaster(id){if(!confirm('この薬剤を削除する？'))return;sprayMasters=sprayMasters.filter(m=>m.id!==id);plants.forEach(p=>delete p.spray[id]);groups.forEach(g=>{if(groupSettings[g.id]?.spray) delete groupSettings[g.id].spray[id]});saveAll();render()}
    function openPlantEdit(id){const p=plants.find(x=>x.id===id);if(!p)return;openModal('株編集',`<div class='modal-grid'><div><label>株名</label><input id='editPlantName' value='${esc(p.name)}'></div><div><label>グループ</label><select id='editPlantGroup'>${groups.map(g=>`<option value='${g.id}' ${p.groupId===g.id?'selected':''}>${esc(g.name)}</option>`).join('')}</select></div><div><label>水の空き日数</label><input id='editWaterInterval' type='number' value='${p.water.interval}'></div><div><label>最終水日</label><input id='editWaterLast' type='date' value='${p.water.last}'></div></div><div class='divider'></div><div class='section-title' style='font-size:18px;'>液体処理</div>${liquidMasters.map(m=>`<div class='modal-grid'><div><label>${esc(m.name)} 空き日数</label><input id='edit-liquid-int-${m.id}' type='number' value='${p.liquid[m.id].interval}'></div><div><label>${esc(m.name)} 最終日</label><input id='edit-liquid-last-${m.id}' type='date' value='${p.liquid[m.id].last}'></div></div>`).join('')}<div class='divider'></div><div class='section-title' style='font-size:18px;'>薬剤</div>${sprayMasters.map(m=>`<div class='modal-grid'><div><label>${esc(m.name)} 空き日数</label><input id='edit-spray-int-${m.id}' type='number' value='${p.spray[m.id].interval}'></div><div><label>${esc(m.name)} 最終日</label><input id='edit-spray-last-${m.id}' type='date' value='${p.spray[m.id].last}'></div></div>`).join('')}<div><label>メモ</label><textarea id='editPlantNote'>${esc(p.note||'')}</textarea></div><div class='footer-actions'><button class='secondary' onclick='closeModal()'>キャンセル</button><button class='primary' onclick='savePlantEdit(${id})'>保存</button></div>`)}
    function savePlantEdit(id){const p=plants.find(x=>x.id===id);if(!p)return;p.name=$('editPlantName').value.trim()||p.name;p.groupId=$('editPlantGroup').value;p.water.interval=Number($('editWaterInterval').value||p.water.interval);p.water.last=$('editWaterLast').value||p.water.last;liquidMasters.forEach(m=>{p.liquid[m.id].interval=Number($("edit-liquid-int-"+m.id).value||p.liquid[m.id].interval);p.liquid[m.id].last=$("edit-liquid-last-"+m.id).value||p.liquid[m.id].last});sprayMasters.forEach(m=>{p.spray[m.id].interval=Number($("edit-spray-int-"+m.id).value||p.spray[m.id].interval);p.spray[m.id].last=$("edit-spray-last-"+m.id).value||p.spray[m.id].last});p.note=$('editPlantNote').value.trim();saveAll();closeModal();render()}
    function openHistoryEdit(id){const h=history.find(x=>x.id===id);if(!h)return;openModal('履歴編集',`<div class='modal-grid'><div><label>日付</label><input id='editHistoryDate' type='date' value='${h.date}'></div><div><label>株</label><select id='editHistoryPlant'>${plants.map(p=>`<option value='${p.id}' ${p.id===h.plantId?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div><div><label>ラベル</label><input id='editHistoryLabel' value='${esc(h.label)}'></div><div><label>メモ</label><input id='editHistoryMemo' value='${esc(h.memo||'')}'></div></div><div class='footer-actions'><button class='danger' onclick='deleteHistory(${JSON.stringify(id)})'>削除</button><button class='secondary' onclick='closeModal()'>キャンセル</button><button class='primary' onclick='saveHistoryEdit(${JSON.stringify(id)})'>保存</button></div>`)}
    function saveHistoryEdit(id){const h=history.find(x=>x.id===id);if(!h)return;h.date=$('editHistoryDate').value||h.date;h.plantId=Number($('editHistoryPlant').value);h.label=$('editHistoryLabel').value.trim()||h.label;h.memo=$('editHistoryMemo').value.trim();saveAll();closeModal();render()}
    function deleteHistory(id){if(!confirm('この履歴を削除する？'))return;history=history.filter(h=>h.id!==id);saveAll();closeModal();render()}
    function previewBulk(){if(!bulkSelectedGroups.length)return alert('グループを選択して');const mode=$('bulkMode').value;const selectedId=mode==='liquid'?$('bulkLiquidSelect').value:mode==='spray'?$('bulkSpraySelect').value:null;const date=$('bulkDate').value||judgeDate;const memo=$('bulkMemo').value.trim();let targets=plants.filter(p=>bulkSelectedGroups.includes(p.groupId));if(!targets.length)return alert('対象株なし');openModal('一括入力の確認',`<div class='stack'><div>対象グループ: ${bulkSelectedGroups.map(groupName).map(esc).join(' / ')}</div><div>処理: ${mode==='water'?'水':mode==='liquid'?'液体処理':'薬剤'} ${mode==='liquid'?(liquidMasters.find(x=>x.id===selectedId)?.name||''):mode==='spray'?(sprayMasters.find(x=>x.id===selectedId)?.name||''):''}</div><div>日付: ${date}</div><div>メモ: ${esc(memo||'-')}</div><div class='small'>外したい株はチェックを外してから実行</div><div class='check-list'>${targets.map(p=>`<label class='check-item' id='target-row-${p.id}'><input type='checkbox' class='bulk-target-check' value='${p.id}' checked onchange='toggleTargetRow(${p.id}, this.checked)' style='width:auto'><span>${esc(p.name)} <span class='small'>(${esc(groupName(p.groupId))})</span></span></label>`).join('')}</div><div class='footer-actions'><button class='secondary' onclick='closeModal()'>キャンセル</button><button class='primary' onclick='confirmBulk("${mode}",${JSON.stringify(selectedId)},"${date}",${JSON.stringify(memo)})'>実行</button></div></div>`)}
    function toggleTargetRow(id,checked){const row=$('target-row-'+id);if(row) row.classList.toggle('off',!checked)}
    function confirmBulk(mode,selectedId,date,memo){const ids=[...document.querySelectorAll('.bulk-target-check:checked')].map(el=>Number(el.value));ids.forEach(id=>{const p=plants.find(x=>x.id===id);if(p) applyActionToPlant(p,mode,selectedId,date,memo)});saveAll();closeModal();render()}
    function noop(){}

    tabs.forEach(btn=>btn.addEventListener('click',()=>{tabs.forEach(b=>b.classList.remove('active'));btn.classList.add('active');Object.values(sections).forEach(sec=>sec.classList.add('hidden'));sections[btn.dataset.tab].classList.remove('hidden')}));
    $('judgeDate').addEventListener('change',e=>{judgeDate=e.target.value;saveAll();render()});$('bulkMode').addEventListener('change',renderBulk);$('bulkPreviewBtn').addEventListener('click',previewBulk);$('addPlantBtn').addEventListener('click',addPlantFromForm);$('addGroupBtn').addEventListener('click',addGroup);$('addLiquidBtn').addEventListener('click',addLiquidMaster);$('addSprayMasterBtn').addEventListener('click',addSprayMaster);$('closeModalBtn').addEventListener('click',closeModal);$('modalWrap').addEventListener('click',e=>{if(e.target===$('modalWrap'))closeModal()});$('clearHistoryBtn').addEventListener('click',()=>{$('historySearch').value='';$('historyTypeFilter').value='all';$('historyPlantFilter').value='all';render()});$('clearPlantFilterBtn').addEventListener('click',()=>{$('plantSearch').value='';$('plantGroupFilter').value='all';$('plantDueOnly').checked=false;render()});['historySearch','historyTypeFilter','historyPlantFilter','plantSearch','plantGroupFilter','plantDueOnly','newPlantGroup'].forEach(id=>$(id).addEventListener($(id).tagName==='SELECT'||$(id).type==='checkbox'?'change':'input',render));
    window.quickApply=quickApply;window.updatePlantValue=updatePlantValue;window.changePlantGroup=changePlantGroup;window.movePlant=movePlant;window.deletePlant=deletePlant;window.renameGroup=renameGroup;window.updateGroupWater=updateGroupWater;window.deleteGroup=deleteGroup;window.confirmDeleteGroup=confirmDeleteGroup;window.deleteLiquidMaster=deleteLiquidMaster;window.openSprayMasterEdit=openSprayMasterEdit;window.saveSprayMasterEdit=saveSprayMasterEdit;window.deleteSprayMaster=deleteSprayMaster;window.openPlantEdit=openPlantEdit;window.savePlantEdit=savePlantEdit;window.openHistoryEdit=openHistoryEdit;window.saveHistoryEdit=saveHistoryEdit;window.deleteHistory=deleteHistory;window.closeModal=closeModal;window.toggleTargetRow=toggleTargetRow;window.confirmBulk=confirmBulk;window.noop=noop;
    render();
  </script>
</body>
</html>
